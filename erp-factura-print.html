<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Factura</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:'Segoe UI',Arial,sans-serif;font-size:8pt;color:#1a1a1a;background:#ccc}

    /* ── A4 ── */
    .page{
      width:210mm;min-height:297mm;background:#fff;
      margin:10mm auto;padding:16mm 20mm 14mm;
      display:flex;flex-direction:column;
    }

    /* ── LOGO ── */
    .logo{text-align:center;margin-bottom:14mm}
    .logo img{height:52px;display:block;margin:0 auto}

    /* ── FACTURA LABEL ── */
    .lbl-factura{color:#00387C;font-weight:800;font-size:10px;letter-spacing:2px;margin-bottom:6mm}

    /* ── CLIENT ── */
    .client-block{margin-bottom:7mm;line-height:1.65;text-transform:uppercase}
    .cli-code{color:#aaa;font-size:7.5pt}
    .cli-name{font-weight:700;font-size:10pt}
    .cli-nif{color:#666}

    /* ── INFO GRID: 3 columnes, CSS grid per alineació ── */
    .info-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14mm;margin-bottom:7mm}
    .info-col{display:grid;grid-template-columns:auto 1fr;column-gap:6px;align-content:start}
    .ik{color:#888;white-space:nowrap;line-height:1.8;align-self:start}
    .iv{font-weight:600;color:#1a1a1a;line-height:1.8}
    .nref-desc{display:block;font-weight:400;color:#555;font-size:7.5pt;line-height:1.5;margin-top:1px}

    /* ── FACTURA NUM ── */
    .fra-num-line{margin-bottom:3mm}
    .fra-num-line .lbl{color:#00387C;font-weight:700}
    .fra-num-line .val{color:#00387C;font-weight:700;font-size:10pt;margin-left:6px}

    /* ── LINES + TOTALS ── */
    /* Única ratlla: la que separa el número de factura del cos */
    .invoice-body{border-top:0.25pt solid #00387C;padding-top:3mm;flex:1}

    /* Lines */
    .line-row{display:flex;justify-content:space-between;align-items:flex-start;padding:1.2mm 0}
    .line-desc{flex:1;padding-right:10mm;line-height:1.5}
    .line-art{color:#888;font-size:7.5pt;margin-right:5px}
    .line-amt{white-space:nowrap;font-weight:400;text-align:right;min-width:75px}

    /* Totals: bloc dret, sense ratlla */
    .totals-block{margin-top:5mm;margin-left:auto;width:35%}
    .tot-row{display:flex;justify-content:space-between;gap:10mm;padding:1px 0}
    .tot-row .tl{color:#555}
    .tot-row .tv{text-align:right;min-width:70px}
    .tot-row .neg{color:#b00}
    .tot-grand{font-weight:400;margin-top:2mm}

    /* ── FOOTER ── */
    .footer{margin-top:auto;padding-top:6mm}
    .footer-img{
      display:block;width:100%;
      padding-bottom:3mm;
    }
    .footer-sep{
      border:none;border-top:0.25pt solid #5B281A;
      width:100%;
    }
    .footer-addr{
      text-align:center;font-size:8pt;color:#00387C;font-weight:300;
      font-family:'Myriad Pro','Segoe UI Light',Arial,sans-serif;
      padding-top:2.5mm;letter-spacing:0.3px;
    }

    /* ── PRINT BTN ── */
    .btn-print{
      position:fixed;top:10px;right:10px;
      background:#00387C;color:#fff;border:none;padding:7px 18px;
      border-radius:6px;cursor:pointer;font-size:13px;font-weight:600;z-index:100;
    }

    @media print{
      body{background:#fff}
      .btn-print{display:none}
      .page{margin:0;padding:14mm 18mm 0;width:100%;height:auto;min-height:297mm}
      .invoice-body{margin-bottom:40mm}
      .footer{position:fixed;bottom:10mm;left:18mm;right:18mm;margin-top:0;padding-top:0}
      @page{size:A4;margin:0}
    }
  </style>
</head>
<body>

<button class="btn-print" onclick="window.print()">Imprimir</button>

<div class="page">
  <div class="logo" id="logo-block">
    <img src="logo.png" alt="ACR Estruch">
  </div>

  <div class="lbl-factura" id="lbl-factura">FACTURA</div>

  <div class="client-block" id="client-block"></div>

  <div class="info-grid" id="info-grid"></div>

  <div class="fra-num-line">
    <span class="lbl" id="lbl-fra-num">Factura num.</span>
    <span class="val" id="fra-num-val"></span>
  </div>

  <div class="invoice-body">
    <div id="lines-section"></div>
    <div class="totals-block" id="totals-section"></div>
  </div>

  <div class="footer">
    <img src="footer-peu(ia)2.png" alt="Dades fiscals i bancàries" class="footer-img">
    <hr class="footer-sep">
    <div class="footer-addr">
      Muntaner, 440, 1-1B &nbsp;|&nbsp; 08006 Barcelona &nbsp;|&nbsp;
      +34 609852478 &nbsp;|&nbsp; info@acrestruch.com &nbsp;|&nbsp; www.acrestruch.com
    </div>
  </div>
</div>

<script>
const SB_URL = 'https://ftuaeaghnnlusigqtoqv.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ0dWFlYWdobm5sdXNpZ3F0b3F2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNjI0MjIsImV4cCI6MjA5NTczODQyMn0.9n1gWnq_QfrLIWU7sIBReXgQAGA-NPFOpsdDp-jbDW8';

// ── TRADUCCIONS ──
const T = {
  ca:{ factura:'FACTURA', data_fra:'Data factura', data_venc:'Data de venciment',
       forma_pag:'Forma de pagament', divisa:'Divisa', nref:'N/ref',
       idin:'IdIN', sref:'S/ref', banco:'Banco', bancag:'Banc Ag.',
       iban:'IBAN/BIC', swift:'Swift',
       fra_num:'Factura núm.', art:'Article', desc:'Descripció',
       base:'Base Imposable', iva:'I.V.A.', irpf:'I.R.P.F.', total:'Total Factura',
       denom:'Denominació fiscal', nomcom:'Nom comercial' },
  es:{ factura:'FACTURA', data_fra:'Fecha factura', data_venc:'Fecha vencimiento',
       forma_pag:'Forma de pago', divisa:'Divisa', nref:'N/ref',
       idin:'IdIN', sref:'S/ref', banco:'Banco', bancag:'Suc./Ag.',
       iban:'IBAN/BIC', swift:'Swift',
       fra_num:'Factura núm.', art:'Artículo', desc:'Descripción',
       base:'Base Imponible', iva:'I.V.A.', irpf:'I.R.P.F.', total:'Total Factura',
       denom:'Denominación fiscal', nomcom:'Nombre comercial' },
  en:{ factura:'INVOICE', data_fra:'Invoice date', data_venc:'Due date',
       forma_pag:'Payment method', divisa:'Currency', nref:'Ref.',
       idin:'IdIN', sref:'Your ref.', banco:'Bank', bancag:'Branch',
       iban:'IBAN/BIC', swift:'Swift',
       fra_num:'Invoice no.', art:'Item', desc:'Description',
       base:'Subtotal', iva:'VAT', irpf:'Withholding tax', total:'Invoice Total',
       denom:'Legal entity', nomcom:'Trading name' },
  fr:{ factura:'FACTURE', data_fra:'Date facture', data_venc:"Date d'échéance",
       forma_pag:'Mode de paiement', divisa:'Devise', nref:'Réf.',
       idin:'IdIN', sref:'Votre réf.', banco:'Banque', bancag:'Agence',
       iban:'IBAN/BIC', swift:'Swift',
       fra_num:'Facture n°', art:'Article', desc:'Description',
       base:'Base imposable', iva:'T.V.A.', irpf:'Retenue à la source', total:'Total Facture',
       denom:'Dénomination fiscale', nomcom:'Nom commercial' },
  de:{ factura:'RECHNUNG', data_fra:'Rechnungsdatum', data_venc:'Fälligkeitsdatum',
       forma_pag:'Zahlungsmethode', divisa:'Währung', nref:'Ref.',
       idin:'IdIN', sref:'Ihre Ref.', banco:'Bank', bancag:'Filiale',
       iban:'IBAN/BIC', swift:'Swift',
       fra_num:'Rechnung Nr.', art:'Artikel', desc:'Beschreibung',
       base:'Nettobetrag', iva:'MwSt.', irpf:'Quellensteuer', total:'Gesamtbetrag',
       denom:'Steuerliche Bezeichnung', nomcom:'Handelsname' },
};

const fd  = d => d ? d.replace(/(\d{4})-(\d{2})-(\d{2})/, '$3.$2.$1') : '';
const fN  = (v,d=2) => (+v||0).toLocaleString('ca-ES',{minimumFractionDigits:d,maximumFractionDigits:d});
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

async function sbGet(table, qs=''){
  const r = await fetch(`${SB_URL}/rest/v1/${table}?${qs}`,{
    headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Accept':'application/json'}
  });
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}

function infoRow(k, v){
  if(!v && v !== 0) return '';
  return `<span class="ik">${esc(k)}</span><span class="iv">${esc(v)}</span>`;
}

async function load(){
  const params = new URLSearchParams(location.search);
  const noFra  = params.get('no');
  const lang   = params.get('lang') || 'ca';
  const t      = T[lang] || T.ca;
  const isCO   = (params.get('tipus')||'').toUpperCase() === 'CO';

  if(!noFra){ document.getElementById('fra-num-val').textContent = '—'; return; }
  document.title = `${t.factura} ${noFra}`;

  // Apply static labels
  document.getElementById('lbl-factura').textContent  = t.factura;
  document.getElementById('lbl-fra-num').textContent  = t.fra_num;

  try{
    const [fras, lines] = await Promise.all([
      sbGet('factures', `no_factura=eq.${encodeURIComponent(noFra)}&limit=1`),
      sbGet('factura_lines', `no_factura=eq.${encodeURIComponent(noFra)}&order=ordre`),
    ]);

    if(!fras.length){
      document.getElementById('fra-num-val').textContent = `${noFra} — no trobada`;
      return;
    }
    const inv = fras[0];
    document.getElementById('fra-num-val').textContent = noFra;

    // Detect SV/CO from invoice classe_fra if not in URL
    const tipusEfectiu = params.get('tipus') ? isCO : (inv.classe_fra||'SV') === 'CO';

    // ── CLIENT + PROJECTE en paral·lel ──
    const [cliArr, prjArr] = await Promise.all([
      inv.id_client
        ? sbGet('clients', `id=eq.${inv.id_client}&select=codi,rao_social,nif_vat,adreca,cp,ciutat,pais&limit=1`)
        : Promise.resolve([]),
      inv.n_ref
        ? sbGet('projectes', `IdPJ=eq.${encodeURIComponent(inv.n_ref)}&select=IdPJ,Descripcio&limit=1`)
        : Promise.resolve([]),
    ]);
    const cli = cliArr[0] || null;
    const prj = prjArr[0] || null;

    // ── CLIENT BLOCK ──
    const cb = document.getElementById('client-block');
    if(cli){
      const adr = [cli.adreca, [cli.cp, cli.ciutat].filter(Boolean).join(' ')].filter(Boolean);
      cb.innerHTML =
        `<div class="cli-code">${esc(cli.codi||'')}</div>
         <div class="cli-name">${esc(cli.rao_social||'')}</div>
         ${cli.nif_vat?`<div class="cli-nif">${esc(cli.nif_vat)}</div>`:''}
         ${adr.map(l=>`<div>${esc(l)}</div>`).join('')}
         ${cli.pais?`<div>${esc(cli.pais)}</div>`:''}`;
    } else if(inv.id_client){
      cb.innerHTML = `<div class="cli-code" style="color:#c00">Client ${inv.id_client} no trobat</div>`;
    }

    // ── INFO GRID ──
    const nrefVal = inv.n_ref || inv.id_projecte || '';
    const prjDesc = prj ? prj.Descripcio : '';
    const idIN    = inv.id || '';

    // N/ref: codi a la 1a línia, descripció indentada a sota (span.nref-desc = display:block)
    const nrefHtml = `<span class="ik">${esc(t.nref)}</span><span class="iv">${esc(nrefVal)}${prjDesc?`<span class="nref-desc">${esc(prjDesc)}</span>`:''}</span>`;

    document.getElementById('info-grid').innerHTML = `
      <div class="info-col">
        ${infoRow(t.data_fra,  fd(inv.data_fra))}
        ${infoRow(t.data_venc, fd(inv.data_venciment))}
        ${infoRow(t.forma_pag, inv.forma_pag||'')}
        ${infoRow(t.divisa,    inv.divisa||'EUR')}
      </div>
      <div class="info-col">
        ${nrefHtml}
        ${infoRow(t.idin, idIN)}
        ${infoRow(t.sref, inv.s_ref||'')}
      </div>
      <div class="info-col">
        ${infoRow(t.banco,  inv.banc||'')}
        ${infoRow(t.bancag, inv.banc_ag||'')}
        ${infoRow(t.iban,   inv.iban_bic||'')}
        ${infoRow(t.swift,  inv.swift||'')}
      </div>`;

    // ── LINES ──
    document.getElementById('lines-section').innerHTML = lines.map(l=>{
      const art = (tipusEfectiu && l.article)
        ? `<span class="line-art">${esc(l.article)}</span>`
        : '';
      return `<div class="line-row">
        <div class="line-desc">${art}${esc(l.descripcio||'')}</div>
        <div class="line-amt">${fN(l.import_linia)} EUR</div>
      </div>`;
    }).join('');

    // ── TOTALS ──
    const ivaPct  = +(inv.tipus_iva  ?? 21);
    const irpfPct = +(inv.tipus_irpf ?? 0);
    let html = '';
    html += `<div class="tot-row"><span class="tl">${t.base}</span><span class="tv">${fN(inv.base_imposable)} EUR</span></div>`;
    if(ivaPct)  html += `<div class="tot-row"><span class="tl">${fN(ivaPct,0)}% ${t.iva}</span><span class="tv">${fN(inv.import_iva)} EUR</span></div>`;
    if(irpfPct) html += `<div class="tot-row"><span class="tl">${fN(irpfPct,0)}% ${t.irpf}</span><span class="tv neg">-${fN(Math.abs(inv.import_irpf))} EUR</span></div>`;
    html += `<div class="tot-row tot-grand"><span class="tl">${t.total}</span><span class="tv">${fN(inv.total_factura)} EUR</span></div>`;
    document.getElementById('totals-section').innerHTML = html;

  }catch(e){
    console.error(e);
    document.getElementById('fra-num-val').textContent += ' — Error: '+e.message;
  }
}

load();
</script>
</body>
</html>
