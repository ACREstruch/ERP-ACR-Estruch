<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP ACR Estruch — Canvia contrasenya</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blue:#00387C;--blue-mid:#1a54a0;--r:8px;}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#00387C 0%,#1a54a0 50%,#00387C 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:12px;box-shadow:0 24px 64px rgba(0,0,0,.3);width:100%;max-width:400px;overflow:hidden}
.card-top{background:linear-gradient(135deg,var(--blue),var(--blue-mid));padding:28px 32px;text-align:center}
.logo{font-size:22px;font-weight:800;color:#fff}
.card-body{padding:32px}
.fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
.fg label{font-size:11px;font-weight:700;color:#6c757d;text-transform:uppercase;letter-spacing:.5px}
.fg input{padding:10px 14px;border:2px solid #dee2e6;border-radius:var(--r);font-size:14px;outline:none;font-family:inherit}
.fg input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(0,56,124,.1)}
.btn{width:100%;padding:12px;background:var(--blue);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;margin-top:4px}
.btn:hover{background:var(--blue-mid)}
.btn:disabled{opacity:.6;cursor:default}
.msg{border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:16px;display:none}
.msg.show{display:block}
.msg.err{background:#f8d7da;color:#721c24;border:1px solid #f5c6cb}
.msg.ok{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.back{display:block;text-align:center;margin-top:16px;font-size:12.5px;color:var(--blue)}
</style>
</head>
<body>
<div class="card">
  <div class="card-top"><div class="logo">Canvia la contrasenya</div></div>
  <div class="card-body">
    <div class="msg" id="msg"></div>
    <div class="fg"><label>Correu electrònic</label>
      <input type="email" id="email" value="jaume.estruch@acrestruch.com" autocomplete="email"></div>
    <div class="fg"><label>Contrasenya actual</label>
      <input type="password" id="cur" autocomplete="current-password"></div>
    <div class="fg"><label>Contrasenya nova</label>
      <input type="password" id="new1" autocomplete="new-password"></div>
    <div class="fg"><label>Repeteix la contrasenya nova</label>
      <input type="password" id="new2" autocomplete="new-password"></div>
    <button class="btn" id="btn" onclick="doChange()">Canvia la contrasenya</button>
    <a class="back" href="login.html">← Torna a l'accés</a>
  </div>
</div>
<script src="js/neon-client.js"></script>
<script>
async function doChange(){
  const email=document.getElementById('email').value.trim();
  const cur=document.getElementById('cur').value;
  const n1=document.getElementById('new1').value;
  const n2=document.getElementById('new2').value;
  const msg=document.getElementById('msg');
  const btn=document.getElementById('btn');
  msg.className='msg';

  if(!email||!cur||!n1||!n2){ show('err','Omple tots els camps.'); return; }
  if(n1!==n2){ show('err','Les contrasenyes noves no coincideixen.'); return; }
  if(n1.length<8){ show('err','La contrasenya nova ha de tenir almenys 8 caràcters.'); return; }

  btn.disabled=true; btn.textContent='Canviant...';
  try{
    const signIn=await fetch(`${NEON_AUTH_URL}/sign-in/email`,{
      method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
      body:JSON.stringify({email,password:cur})
    });
    if(!signIn.ok){
      const d=await signIn.json().catch(()=>({}));
      throw new Error(d.message || `Error d'accés (${signIn.status}). Comprova que aquest domini és a la llista de dominis de confiança de Neon Auth.`);
    }

    const change=await fetch(`${NEON_AUTH_URL}/change-password`,{
      method:'POST',headers:{'Content-Type':'application/json'},credentials:'include',
      body:JSON.stringify({currentPassword:cur,newPassword:n1,revokeOtherSessions:true})
    });
    if(!change.ok){ const d=await change.json().catch(()=>({})); throw new Error(d.message||'No s\'ha pogut canviar la contrasenya.'); }

    show('ok','Contrasenya canviada correctament. Ja pots tornar a l\'accés i entrar amb la nova.');
    document.getElementById('cur').value='';
    document.getElementById('new1').value='';
    document.getElementById('new2').value='';
  }catch(e){
    show('err',e.message);
  }finally{
    btn.disabled=false; btn.textContent='Canvia la contrasenya';
  }
}
function show(type,text){
  const msg=document.getElementById('msg');
  msg.className='msg show '+type;
  msg.textContent=text;
}
</script>
</body>
</html>
